<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JorgeMania</title>

    <!-- CONFIGURACIÓN DE DISCORD (OPEN GRAPH) -->
    <meta property="og:title" content="¡Ya está aquí JorgeMania! 🚀" />
    <meta property="og:description" content="Hemos montado la mejor revista friki. ¡Échale un ojo directamente desde el navegador!" />
    <meta property="og:image" content="https://jorgitothebest.github.io/JorgeMania/portada.jpg" />
    <meta property="og:type" content="website" />
    <meta name="theme-color" content="#7289DA"> 
    
    <!-- TARJETA GRANDE DE TWITTER/DISCORD -->
    <meta name="twitter:card" content="summary_large_image">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            background-color: #1a1a1a;
            overflow: hidden;
            font-family: sans-serif;
        }
        /* Contenedor del PDF */
        .revista-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        object, iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="revista-container">
        <!-- Reemplaza "revista.pdf" por el nombre exacto de tu archivo -->
        <object data="revista.pdf" type="application/pdf">
            <iframe src="revista.pdf">
                <p>Tu navegador no soporta la vista del PDF. Puedes <a href="revista.pdf">descargarlo aquí</a>.</p>
            </iframe>
        </object>
    </div>

</body>
</html>
